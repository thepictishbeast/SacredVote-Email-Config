# PlausiDen Sovereign Mail Server — OpenDKIM configuration
# Signs outbound mail for sacred.vote, sacredvote.org, plausiden.com

Syslog          yes
LogWhy          yes
SyslogSuccess   yes

Domain          sacred.vote,sacredvote.org,plausiden.com
KeyTable        /etc/opendkim/key.table
SigningTable    refile:/etc/opendkim/signing.table
InternalHosts   /etc/opendkim/trusted.hosts

Socket          inet:8891@localhost
PidFile         /run/opendkim/opendkim.pid
UserID          opendkim
Canonicalization relaxed/simple
Mode            sv
SubDomains      no
OversignHeaders From
