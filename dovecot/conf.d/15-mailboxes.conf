##
## Mailbox definitions — auto-subscribed folders + Gmail-style categories
##

# NOTE: Assumes "namespace inbox" has been defined in 10-mail.conf.
namespace inbox {
  # ── Standard IMAP folders (auto-subscribed) ──────────────────────
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Archive {
    special_use = \Archive
    auto = subscribe
  }

  # ── SacredVote system mail ──────────────────────────────────────
  # All emails from @sacred.vote and @sacredvote.org land here
  mailbox SacredVote {
    auto = subscribe
  }
  mailbox SacredVote/Alerts {
    auto = subscribe
  }
  mailbox SacredVote/Security {
    auto = subscribe
  }
  mailbox SacredVote/Support {
    auto = subscribe
  }

  # ── Gmail-style categories ──────────────────────────────────────
  mailbox Updates {
    auto = subscribe
  }
  mailbox Social {
    auto = subscribe
  }
  mailbox Promotions {
    auto = subscribe
  }
  mailbox Forums {
    auto = subscribe
  }
}
