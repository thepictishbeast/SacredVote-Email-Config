# SacredVote Mail Server — Dovecot configuration
# IMAP + LMTP + Sieve filtering + Shared namespaces

protocols = imap lmtp sieve

# ── Authentication — password file based ──
auth_mechanisms = plain login
passdb {
  driver = passwd-file
  args = /etc/dovecot/users
}
userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/mail/vhosts/%d/%n
}

# ── Global plugins: ACL for shared mailbox access ──
mail_plugins = acl

# ── Protocol-specific plugins ──
protocol imap {
  mail_plugins = $mail_plugins imap_acl
}

protocol lmtp {
  mail_plugins = $mail_plugins sieve
}

# ── LMTP socket for Postfix local delivery ──
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

# ── SASL auth socket for Postfix submission (port 587) ──
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0666
    user = postfix
    group = postfix
  }
}

# ── IMAP — TLS only, no plaintext ──
service imap-login {
  inet_listener imap {
    port = 0
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# ── ManageSieve — localhost only ──
# Defense in depth: the only consumer is Roundcube on this same host, which
# connects via 127.0.0.1:4190. Externally exposing ManageSieve gives
# attackers a credentialed-script-upload vector with no upside (no external
# Sieve client is configured). Bound to 127.0.0.1 so the kernel will not
# accept off-host connections even if nftables fails open. To re-enable
# external Sieve management, set address back to 0.0.0.0 and reload Dovecot.
service managesieve-login {
  inet_listener sieve {
    address = 127.0.0.1
    port = 4190
  }
}

# ── TLS — Let's Encrypt cert ──
ssl = required
ssl_cert = </etc/letsencrypt/live/mail.sacred.vote/fullchain.pem
ssl_key = </etc/letsencrypt/live/mail.sacred.vote/privkey.pem
ssl_min_protocol = TLSv1.2

# ── Mail storage ──
mail_location = maildir:/var/mail/vhosts/%d/%n/Maildir

# ── Private namespace (user's own INBOX) ──
namespace inbox {
  type = private
  separator = /
  prefix =
  inbox = yes
}

# ── Shared namespace — tim@ sees all service mailboxes ──
namespace shared {
  type = shared
  separator = /
  prefix = shared/%%u/
  location = maildir:/var/mail/vhosts/%%d/%%n/Maildir:INDEX=~/Maildir/shared/%%u
  subscriptions = no
  list = children
}

# ── Plugin configuration ──
plugin {
  # Sieve: server-side mail filtering
  sieve = /var/mail/vhosts/%d/%n/.dovecot.sieve
  sieve_dir = /var/mail/vhosts/%d/%n/sieve
  sieve_before = /etc/dovecot/sieve-before.d/

  # ACL: shared mailbox access control
  acl = vfile
  acl_shared_dict = file:/var/lib/dovecot/shared-mailboxes
}

# ── Logging ──
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log
